<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", sans-serif; background: #fafafa; min-height: 100vh; }
:root {
  --yellow: #F5B800; --yellow-dark: #D9A300; --yellow-light: #FFF3C4;
  --dark: #1A1A1A; --gray: #666; --border: #e0e0e0; --white: #fff;
}
.header {
  background: var(--yellow); padding: 0 28px; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.header-title { font-size: 18px; font-weight: 700; color: var(--dark); }
.header-user { font-size: 13px; font-weight: 600; color: var(--dark); }
.loading-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 68px); background: #fffbe8;
  flex-direction: column; gap: 16px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid #e0e0e0;
  border-top-color: var(--yellow); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.app { display: none; }
.main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }
.card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 20px; margin-bottom: 20px;
}
.card-title { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 16px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; }
.field-value {
  font-size: 13px; padding: 7px 10px; border: 1.5px solid var(--border);
  border-radius: 6px; background: #f9f9f9; color: var(--dark); min-width: 160px;
}
select, input[type=number], textarea {
  font-family: inherit; border: 1.5px solid var(--border); border-radius: 6px;
  padding: 7px 10px; font-size: 13px; background: var(--white); outline: none; transition: border 0.15s;
}
select:focus, input[type=number]:focus, textarea:focus { border-color: var(--yellow-dark); }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
.dias-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 16px; }
.dia-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.dia-col .fecha {
  font-size: 11px; font-weight: 700; background: var(--dark); color: var(--white);
  padding: 3px 8px; border-radius: 4px; white-space: nowrap;
}
.dia-col input[type=number] { width: 70px; text-align: center; }
.dia-col .chk { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--gray); cursor: pointer; }
.dia-col .chk input { width: 14px; height: 14px; accent-color: var(--yellow-dark); cursor: pointer; }
.btn {
  border: none; border-radius: 7px; padding: 9px 18px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--yellow); color: var(--dark); }
.btn-primary:hover { background: var(--yellow-dark); }
.btn-secondary { background: var(--yellow-light); color: #7a6000; }
.btn-secondary:hover { background: #ffe07a; }
.btn-danger { background: #fdecea; color: #c0392b; }
.btn-danger:hover { background: #f8d0cd; }
.btn-green { background: #e6f4ea; color: #1e7e34; }
.btn-green:hover { background: #c8e6c9; }
.btn-dark { background: var(--dark); color: var(--white); }
.btn-dark:hover { background: #333; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
.pedidos-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.pedidos-table th {
  background: var(--dark); color: var(--white); padding: 8px 10px; text-align: center;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap;
}
.pedidos-table th:first-child, .pedidos-table th:nth-child(2) { text-align: left; }
.pedidos-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; text-align: center; }
.pedidos-table td:first-child, .pedidos-table td:nth-child(2) { text-align: left; font-weight: 600; }
.pedidos-table tr:hover td { background: #fffbe8; }
.badge {
  display: inline-block; background: var(--yellow-light); color: #7a6000;
  border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700;
}
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 700; color: var(--white);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 1000; display: none;
}
.toast.show { display: block; }
.toast.success { background: #2d7a45; }
.toast.error { background: #c0392b; }
textarea { width: 100%; min-height: 60px; resize: vertical; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-header h3 { font-size: 15px; font-weight: 700; color: var(--dark); }
.descarga-card { background: var(--yellow-light); border: 1.5px solid #e8c800; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
.descarga-card .card-title { color: #7a6000; }
</style>
</head>

    </div>

      <div style="overflow-x:auto;">

          <thead id="tablaHead"></thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>
    </div>

    <div class="descarga-card">
      <div class="card-title">Descargas</div>
      <div class="actions" style="margin-top:0;">

</div>

var msalInstance = null;
var currentAccount = null;
var graphToken = null;
var filasPedido = [];
var currentUser = "";

function getDates() {
  var dates = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date();
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function fmtDate(d) {
  return d.toLocaleDateString("es-AR", { weekday: "short", day: "2-digit", month: "2-digit" });
}

function fmtDateShort(d) {
  return d.toLocaleDateString("es-AR", { day: "2-digit", month: "2-digit" });
}

function fmtDateKey(d) {
  return d.toISOString().split("T")[0];
}

function parseFechaPedido(str) {
  if (!str) return null;
  var parts = str.split("/");
  if (parts.length >= 3) {
    return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  }
  return new Date(str);
}

async function initMsal() {
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CONFIG.clientId,
      authority: "https://login.microsoftonline.com/" + CONFIG.tenantId,
      redirectUri: CONFIG.redirectUri
    },
    cache: { cacheLocation: "sessionStorage" }
  });
  await msalInstance.initialize();
  var response = await msalInstance.handleRedirectPromise();
  if (response) {
    currentAccount = response.account;
    graphToken = response.accessToken;
    showApp(); return;
  }
  var accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    currentAccount = accounts[0];
    await acquireTokenSilent();
    showApp(); return;
  }
  try {
    await msalInstance.ssoSilent({ scopes: ["Sites.ReadWrite.All", "User.Read"] });
    var accs = msalInstance.getAllAccounts();
    if (accs.length > 0) {
      currentAccount = accs[0];
      await acquireTokenSilent();
      showApp(); return;
    }
  } catch(e) {}
  await msalInstance.loginRedirect({ scopes: ["Sites.ReadWrite.All", "User.Read"] });
}

async function acquireTokenSilent() {
  try {
    var result = await msalInstance.acquireTokenSilent({
      account: currentAccount, scopes: ["Sites.ReadWrite.All", "User.Read"]
    });
    graphToken = result.accessToken;
  } catch(e) {
    await msalInstance.acquireTokenRedirect({ account: currentAccount, scopes: ["Sites.ReadWrite.All", "User.Read"] });
  }
}

function showApp() {
  currentUser = currentAccount ? (currentAccount.name || currentAccount.username) : "Usuario";
  document.getElementById("headerUser").textContent = currentUser;
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("appContent").style.display = "block";
  initForm();
}

function initForm() {
  var sel = document.getElementById("selCampo");
  var campos = Object.keys(CAMPOS_ZONA).sort();
  for (var i = 0; i < campos.length; i++) {
    var opt = document.createElement("option");
    opt.value = campos[i]; opt.textContent = campos[i];
    sel.appendChild(opt);
  }
  buildDiasGrid();
}

function buildDiasGrid() {
  var dates = getDates();
  var html = "";
  for (var i = 0; i < dates.length; i++) {
    html += "<div class=\"dia-col\">";
    html += "<span class=\"fecha\">" + fmtDate(dates[i]) + "</span>";
    html += "<input type=\"number\" id=\"cam" + i + "\" min=\"0\" value=\"0\" style=\"width:70px;text-align:center;\">";
    html += "<label class=\"chk\"><input type=\"checkbox\" id=\"emb" + i + "\"> Embolsar</label>";
    html += "</div>";
  }
  document.getElementById("diasGrid").innerHTML = html;
}

function onCampoChange() {
  var campo = document.getElementById("selCampo").value;
  var zona = campo && CAMPOS_ZONA[campo] ? CAMPOS_ZONA[campo] : "-";
  document.getElementById("lblZona").textContent = zona;
  var sel = document.getElementById("selCultivo");
  sel.innerHTML = "<option value=\"\">-- Cultivo --</option>";
  document.getElementById("lblComentarioLog").textContent = "-";
  if (campo && CAMPO_CULTIVOS[campo]) {
    var cultivos = CAMPO_CULTIVOS[campo];
    for (var i = 0; i < cultivos.length; i++) {
      var opt = document.createElement("option");
      opt.value = cultivos[i]; opt.textContent = cultivos[i];
      sel.appendChild(opt);
    }
    sel.disabled = false;
  } else {
    sel.disabled = true;
  }
}

function onCultivoChange() {
  var campo = document.getElementById("selCampo").value;
  var cultivo = document.getElementById("selCultivo").value;
  var key = campo + "|||" + cultivo;
  var comentario = (CULTIVO_COMENTARIOS[key] && CULTIVO_COMENTARIOS[key] !== "None") ? CULTIVO_COMENTARIOS[key] : "-";
  document.getElementById("lblComentarioLog").textContent = comentario;
}

function agregarFila() {
  var campo = document.getElementById("selCampo").value;
  var cultivo = document.getElementById("selCultivo").value;
  if (!campo || !cultivo) { showToast("Selecciona campo y cultivo", "error"); return; }
  var zona = CAMPOS_ZONA[campo] || "";
  var key = campo + "|||" + cultivo;
  var comentarioLog = (CULTIVO_COMENTARIOS[key] && CULTIVO_COMENTARIOS[key] !== "None") ? CULTIVO_COMENTARIOS[key] : "";
  var dates = getDates();
  var fila = { campo: campo, cultivo: cultivo, zona: zona, comentarioLog: comentarioLog, dias: [] };
  for (var i = 0; i < dates.length; i++) {
    fila.dias.push({
      fecha: fmtDateShort(dates[i]),
      fechaKey: fmtDateKey(dates[i]),
      camiones: parseInt(document.getElementById("cam" + i).value) || 0,
      embolsar: document.getElementById("emb" + i).checked
    });
  }
  filasPedido.push(fila);
  renderTabla();
  resetForm();
  showToast("Fila agregada", "success");
}

function resetForm() {
  document.getElementById("selCampo").value = "";
  document.getElementById("lblZona").textContent = "-";
  document.getElementById("selCultivo").innerHTML = "<option value=\"\">-- Cultivo --</option>";
  document.getElementById("selCultivo").disabled = true;
  document.getElementById("lblComentarioLog").textContent = "-";
  for (var i = 0; i < 7; i++) {
    document.getElementById("cam" + i).value = 0;
    document.getElementById("emb" + i).checked = false;
  }
}

function eliminarFila(idx) { filasPedido.splice(idx, 1); renderTabla(); }

function limpiarFilas() {
  if (!confirm("Eliminar todas las filas?")) return;
  filasPedido = []; renderTabla();
}

function renderTabla() {
  var card = document.getElementById("tablaCard");
  document.getElementById("contadorFilas").textContent = filasPedido.length;
  if (filasPedido.length === 0) { card.style.display = "none"; return; }
  card.style.display = "block";
  var dates = getDates();
  var theadHtml = "<tr><th style=\"text-align:left;\">Campo</th><th style=\"text-align:left;\">Cultivo</th><th>Zona</th>";
  for (var i = 0; i < dates.length; i++) theadHtml += "<th>" + fmtDate(dates[i]) + "</th>";
  theadHtml += "<th></th></tr>";
  document.getElementById("tablaHead").innerHTML = theadHtml;
  var tbodyHtml = "";
  for (var r = 0; r < filasPedido.length; r++) {
    var fila = filasPedido[r];
    tbodyHtml += "<tr><td>" + fila.campo + "</td><td><span class=\"badge\">" + fila.cultivo + "</span></td><td>" + (fila.zona||"-") + "</td>";
    for (var d = 0; d < fila.dias.length; d++) {
      var dia = fila.dias[d];
      tbodyHtml += "<td>";
      tbodyHtml += dia.camiones > 0 ? "<strong>" + dia.camiones + "</strong>" : "<span style=\"color:#ccc;\">-</span>";
      if (dia.embolsar) tbodyHtml += "<br><span style=\"font-size:10px;color:#c8a000;font-weight:700;\">EMB</span>";
      tbodyHtml += "</td>";
    }
    tbodyHtml += "<td><button class=\"btn btn-danger\" style=\"padding:4px 10px;font-size:11px;\" onclick=\"eliminarFila(" + r + ")\">x</button></td></tr>";
  }
  document.getElementById("tablaBody").innerHTML = tbodyHtml;
}

async function guardarPedido() {
  if (filasPedido.length === 0) { showToast("Agrega al menos una fila", "error"); return; }
  var btn = document.getElementById("btnGuardar");
  btn.disabled = true; btn.textContent = "Guardando...";
  var comentarios = document.getElementById("txtComentarios").value;
  var fechaPedido = new Date().toLocaleDateString("es-AR");
  var pedidoId = Date.now().toString(36);
  try {
    for (var i = 0; i < filasPedido.length; i++) {
      var fila = filasPedido[i];
      var fields = {
        Title: pedidoId, Usuario: currentUser, FechaPedido: fechaPedido,
        Campo: fila.campo, Cultivo: fila.cultivo, Zona: fila.zona,
        Comentarios: comentarios, ComentarioLogistica: fila.comentarioLog,
        Camiones0: fila.dias[0].camiones, Embolsar0: fila.dias[0].embolsar,
        Camiones1: fila.dias[1].camiones, Embolsar1: fila.dias[1].embolsar,
        Camiones2: fila.dias[2].camiones, Embolsar2: fila.dias[2].embolsar,
        Camiones3: fila.dias[3].camiones, Embolsar3: fila.dias[3].embolsar,
        Camiones4: fila.dias[4].camiones, Embolsar4: fila.dias[4].embolsar,
        Camiones5: fila.dias[5].camiones, Embolsar5: fila.dias[5].embolsar,
        Camiones6: fila.dias[6].camiones, Embolsar6: fila.dias[6].embolsar,
        Fecha0: fila.dias[0].fechaKey, Fecha1: fila.dias[1].fechaKey,
        Fecha2: fila.dias[2].fechaKey, Fecha3: fila.dias[3].fechaKey,
        Fecha4: fila.dias[4].fechaKey, Fecha5: fila.dias[5].fechaKey,
        Fecha6: fila.dias[6].fechaKey
      };
      var r = await fetch(
        "https://graph.microsoft.com/v1.0/sites/" + CONFIG.sharepointSiteId + "/lists/" + CONFIG.sharepointListId + "/items",
        { method: "POST", headers: { "Authorization": "Bearer " + graphToken, "Content-Type": "application/json" }, body: JSON.stringify({ fields: fields }) }
      );
      if (!r.ok) throw new Error("Error " + r.status);
    }
    showToast("Pedido guardado correctamente", "success");
    filasPedido = []; renderTabla();
    document.getElementById("txtComentarios").value = "";
  } catch(e) { showToast("Error al guardar: " + e.message, "error"); }
  btn.disabled = false; btn.textContent = "Guardar Pedido";
}

async function fetchAllItems() {
  var items = [];
  var url = "https://graph.microsoft.com/v1.0/sites/" + CONFIG.sharepointSiteId + "/lists/" + CONFIG.sharepointListId + "/items?$expand=fields&$top=999";
  while (url) {
    var r = await fetch(url, { headers: { "Authorization": "Bearer " + graphToken } });
    var data = await r.json();
    if (data.value) items = items.concat(data.value);
    url = data["@odata.nextLink"] || null;
  }
  return items.map(function(i) { return i.fields; });
}

function csvEscape(v) {
  if (v === null || v === undefined) return "";
  v = String(v);
  if (v.indexOf(",") >= 0 || v.indexOf('"') >= 0 || v.indexOf("\n") >= 0) {
    return '"' + v.replace(/"/g, '""') + '"';
  }
  return v;
}

async function descargarProyeccion() {
  showToast("Generando proyeccion...", "success");
  try {
    var items = await fetchAllItems();
    var today = new Date(); today.setHours(0,0,0,0);
    var dates = [];
    for (var i = 0; i < 7; i++) {
      var d = new Date(today);
      d.setDate(d.getDate() + i);
      dates.push(fmtDateKey(d));
    }

    var colMap = {};
    for (var di = 0; di < dates.length; di++) colMap[dates[di]] = di;

    var cols = ["Campo", "Cultivo", "Zona"];
    for (var di = 0; di < dates.length; di++) {
      var dobj = new Date(dates[di] + "T00:00:00");
      cols.push(fmtDateShort(dobj) + " Camiones");
      cols.push(fmtDateShort(dobj) + " Embolsar");
    }

    var rowMap = {};
    for (var ii = 0; ii < items.length; ii++) {
      var item = items[ii];
      var key = (item.Campo||"") + "|||" + (item.Cultivo||"");
      if (!rowMap[key]) rowMap[key] = { campo: item.Campo||"", cultivo: item.Cultivo||"", zona: item.Zona||"", dias: {} };
      for (var di = 0; di < 7; di++) {
        var fechaKey = item["Fecha" + di];
        if (fechaKey && colMap[fechaKey] !== undefined) {
          var idx = colMap[fechaKey];
          if (!rowMap[key].dias[idx]) rowMap[key].dias[idx] = { cam: 0, emb: false };
          rowMap[key].dias[idx].cam += (parseInt(item["Camiones" + di]) || 0);
          if (item["Embolsar" + di]) rowMap[key].dias[idx].emb = true;
        }
      }
    }

    var csvRows = [cols.map(csvEscape).join(",")];
    var keys = Object.keys(rowMap);
    for (var ki = 0; ki < keys.length; ki++) {
      var row = rowMap[keys[ki]];
      var line = [csvEscape(row.campo), csvEscape(row.cultivo), csvEscape(row.zona)];
      for (var di = 0; di < dates.length; di++) {
        var dia = row.dias[di] || { cam: 0, emb: false };
        line.push(dia.cam > 0 ? dia.cam : "");
        line.push(dia.emb ? "Si" : "");
      }
      csvRows.push(line.join(","));
    }

    downloadCSV(csvRows.join("\n"), "proyeccion_semanal_" + fmtDateKey(today) + ".csv");
    showToast("Descargado", "success");
  } catch(e) { showToast("Error: " + e.message, "error"); }
}

async function descargarHistorico() {
  showToast("Generando historico...", "success");
  try {
    var items = await fetchAllItems();
    var cols = ["Fecha Pedido","Usuario","Campo","Cultivo","Zona","Comentario Logistica","Comentarios","Fecha Camion","Camiones","Embolsado"];
    var csvRows = [cols.map(csvEscape).join(",")];
    for (var ii = 0; ii < items.length; ii++) {
      var item = items[ii];
      for (var di = 0; di < 7; di++) {
        var cam = parseInt(item["Camiones" + di]) || 0;
        if (cam === 0) continue;
        var fechaCamion = item["Fecha" + di] || "";
        if (fechaCamion) {
          var dp = new Date(fechaCamion + "T00:00:00");
          fechaCamion = fmtDateShort(dp);
        }
        var line = [
          csvEscape(item.FechaPedido||""),
          csvEscape(item.Usuario||""),
          csvEscape(item.Campo||""),
          csvEscape(item.Cultivo||""),
          csvEscape(item.Zona||""),
          csvEscape(item.ComentarioLogistica||""),
          csvEscape(item.Comentarios||""),
          csvEscape(fechaCamion),
          cam,
          csvEscape(item["Embolsar" + di] ? "Si" : "No")
        ];
        csvRows.push(line.join(","));
      }
    }
    downloadCSV(csvRows.join("\n"), "historico_pedidos.csv");
    showToast("Descargado", "success");
  } catch(e) { showToast("Error: " + e.message, "error"); }
}

function downloadCSV(content, filename) {
  var bom = "\uFEFF";
  var blob = new Blob([bom + content], { type: "text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "success");
  setTimeout(function() { t.className = "toast"; }, 3500);
}

window.addEventListener("load", function() {
  if (typeof msal === "undefined") {
    document.getElementById("loadingScreen").innerHTML = "<p style=\"color:red;padding:20px;\">Error: No se pudo cargar la libreria de Microsoft.</p>";
    return;
  }
  initMsal();
});
</script>
